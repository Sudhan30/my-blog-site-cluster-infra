# backend-secrets — manual-managed Kubernetes Secret
#
# This Secret is referenced by `blog-backend` (deployment.yaml) and
# `postgres-exporter` (../monitoring/postgres-exporter-deployment.yaml).
#
# It is NOT in the Kustomize tree on purpose — secrets shouldn't ship as
# plaintext in git. Track its current value in your password manager.
#
# Future plan: migrate to Bitwarden Secrets Manager (per MEMORY.md key
# decisions) so this can become Flux-reconciled.
#
# Apply procedure (run when Postgres password rotates or cluster is rebuilt):
#
#   DSN="postgresql://blog_user:<CURRENT_POSTGRES_PASSWORD>@postgres-service:5432/blog_db?sslmode=disable"
#   JWT="<CURRENT_JWT_SECRET>"   # rotate if it was ever leaked
#
#   kubectl create secret generic backend-secrets -n web \
#     --from-literal=database-url="$DSN" \
#     --from-literal=jwt-secret="$JWT" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl rollout restart deploy/blog-backend deploy/postgres-exporter -n web
#
# Then verify:
#   kubectl logs -n web deploy/postgres-exporter --tail=10
#   # Expect: "Established new database connection ... Semantic version changed"
#
# Last rotation: 2026-05-02 (password unified with web/postgres POSTGRES_PASSWORD).
