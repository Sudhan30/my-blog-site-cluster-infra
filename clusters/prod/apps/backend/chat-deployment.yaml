apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-app
  template:
    metadata:
      labels:
        app: chat-app
    spec:
      imagePullSecrets:
      - name: dockerhub-creds
      containers:
      - name: chat
        image: docker.io/sudhan03/chat-app:data-agent
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          value: "postgresql://blog_user:Zx9mKp4vNq8rLt2wYh5jGf3cDe7aXb6sQw1uRe0o@postgres-service:5432/blog_db?sslmode=disable"
        - name: OLLAMA_HOST
          value: "http://ollama-service:11434"
        - name: OLLAMA_CHAT_MODEL
          value: "gemma3:12b"
        - name: OLLAMA_TOOL_MODEL
          value: "qwen3:8b"
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        - name: BRAVE_SEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: brave-search-secret
              key: api-key
        - name: GOTIFY_URL
          value: "http://gotify-service:80"
        - name: GOTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: gotify-secret
              key: app-token
              optional: true
        - name: APP_URL
          value: "https://chat.sudharsana.dev"
        - name: BLOG_DB_READONLY_URL
          value: "postgresql://readonly_agent:R3adOnly_Ag3nt_S3cur3_2026@postgres-service:5432/blog_db"
        - name: TRADING_DB_READONLY_URL
          value: "postgresql://readonly_agent:R3adOnly_Ag3nt_S3cur3_2026@timescaledb.trading.svc.cluster.local:5432/trading_db"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chat-app-service
  namespace: web
spec:
  selector:
    app: chat-app
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
