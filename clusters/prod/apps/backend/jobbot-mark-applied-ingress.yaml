# Routes jobbot.sudharsana.dev → host:8086 (mark_applied_server).
# mark_applied_server runs in-process inside jobbot.service on the host,
# NOT as a K8s workload. We bridge cluster traffic to the host by declaring
# a selector-less Service and a manually-managed Endpoints object pinned to
# the host's LAN IP. Traefik routes the ingress into this Service exactly
# like a normal in-cluster backend.
#
# Auth: mark_applied_server requires MARK_APPLIED_TOKEN on every /applied/
# request. The token is baked into every Done URL generated by
# boards/{apple,google,tiktok}_apply.py.
apiVersion: v1
kind: Service
metadata:
  name: jobbot-mark-applied
  namespace: web
  labels:
    app: jobbot-mark-applied
    component: mark-applied
    part-of: jobbot
spec:
  type: ClusterIP
  # No selector — we manage Endpoints ourselves.
  ports:
    - name: http
      port: 80
      targetPort: 8086
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jobbot-mark-applied  # must match the Service name to bind
  namespace: web
  labels:
    app: jobbot-mark-applied
    component: mark-applied
    part-of: jobbot
subsets:
  - addresses:
      - ip: 192.168.1.146  # suddu-server LAN IP; jobbot.service binds 0.0.0.0:8086
    ports:
      - name: http
        port: 8086
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobbot-mark-applied
  namespace: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - jobbot.sudharsana.dev
      secretName: jobbot-mark-applied-tls
  rules:
    - host: jobbot.sudharsana.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jobbot-mark-applied
                port:
                  number: 80
