apiVersion: batch/v1
kind: CronJob
metadata:
  name: evolution-daily
  namespace: trading
  labels:
    app.kubernetes.io/name: evolution
    app.kubernetes.io/component: daily-monitor
    app.kubernetes.io/part-of: algo-trading-system
spec:
  # 16:30 ET = 20:30 UTC (EST) or 21:30 UTC (EDT)
  # Using 21:30 UTC for EDT (most of the year)
  schedule: "30 21 * * 1-5"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: evolution
            app.kubernetes.io/component: daily-monitor
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: docker-hub-creds
          containers:
            - name: evolution-daily
              image: docker.io/sudhan03/algo-trading:backtester-v67-83213cc
              command: ["python", "-c"]
              args:
                - |
                  import sys
                  sys.path.insert(0, '/app/src')
                  from common.evolution_loop import EvolutionLoop, PerformanceSnapshot
                  from datetime import date
                  # TODO: Pull actual metrics from TimescaleDB
                  print("Evolution daily check placeholder - wire to actual metrics")
              env:
                - name: PYTHONPATH
                  value: /app/src
                - name: DB_HOST
                  value: timescaledb
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: trading_db
                - name: DB_USER
                  value: trading_user
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: trading-secrets
                      key: DB_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
