apiVersion: batch/v1
kind: CronJob
metadata:
  name: evolution-weekly
  namespace: trading
  labels:
    app.kubernetes.io/name: evolution
    app.kubernetes.io/component: weekly-hypothesis
    app.kubernetes.io/part-of: algo-trading-system
spec:
  # Saturday 02:00 ET = 06:00 UTC (EST) or 07:00 UTC (EDT)
  schedule: "0 7 * * 6"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 172800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: evolution
            app.kubernetes.io/component: weekly-hypothesis
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: docker-hub-creds
          containers:
            - name: evolution-weekly
              image: docker.io/sudhan03/algo-trading:backtester-v67-83213cc
              command: ["python", "-c"]
              args:
                - |
                  import sys
                  sys.path.insert(0, '/app/src')
                  from common.evolution_loop import EvolutionLoop
                  loop = EvolutionLoop(results_dir='/tmp/evolution')
                  # TODO: Load performance history from TimescaleDB
                  # TODO: Generate and test hypotheses
                  print("Evolution weekly hypothesis generation placeholder")
              env:
                - name: PYTHONPATH
                  value: /app/src
                - name: DB_HOST
                  value: timescaledb
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: trading_db
                - name: DB_USER
                  value: trading_user
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: trading-secrets
                      key: DB_PASSWORD
                - name: OPT_ML_SIGNALS
                  value: "1"
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                limits:
                  cpu: 2
                  memory: 4Gi
