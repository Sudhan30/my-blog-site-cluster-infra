---
# Chat Agent Service
# FastAPI natural language query endpoint for trading system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-agent
  namespace: trading
  labels:
    app: chat-agent
    app.kubernetes.io/part-of: algo-trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-agent
  template:
    metadata:
      labels:
        app: chat-agent
    spec:
      imagePullSecrets:
      - name: docker-hub-creds
      containers:
      - name: chat-agent
        image: docker.io/sudhan03/algo-trading:chat-agent-5d33bba
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: DB_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: REDIS_PASSWORD
        - name: CHAT_AGENT_PORT
          value: "8080"
        volumeMounts:
        - name: config
          mountPath: /app/config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      volumes:
      - name: config
        configMap:
          name: trading-config
---
apiVersion: v1
kind: Service
metadata:
  name: chat-agent
  namespace: trading
  labels:
    app: chat-agent
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: chat-agent
