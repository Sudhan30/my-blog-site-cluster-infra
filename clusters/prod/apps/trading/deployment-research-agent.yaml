---
# Research Agent Service
# Pre-market briefs, post-trade analysis, risk alerts via Ollama LLM
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-agent
  namespace: trading
  labels:
    app: research-agent
    app.kubernetes.io/part-of: algo-trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: research-agent
  template:
    metadata:
      labels:
        app: research-agent
    spec:
      imagePullSecrets:
      - name: docker-hub-creds
      containers:
      - name: research-agent
        image: docker.io/sudhan03/algo-trading:research-agent-e6f56c7
        imagePullPolicy: Always
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: DB_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: REDIS_PASSWORD
        - name: GOTIFY_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: GOTIFY_URL
        - name: GOTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: GOTIFY_TOKEN
        - name: SLACK_TRADES_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: SLACK_TRADES_WEBHOOK
        - name: SLACK_BUYS_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: SLACK_BUYS_WEBHOOK
        - name: SLACK_SELLS_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: SLACK_SELLS_WEBHOOK
        - name: SLACK_NEWS_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: SLACK_NEWS_WEBHOOK
        - name: SLACK_ERROR_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: SLACK_ERROR_WEBHOOK
        volumeMounts:
        - name: config
          mountPath: /app/config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      volumes:
      - name: config
        configMap:
          name: trading-config
