---
apiVersion: batch/v1
kind: Job
metadata:
  name: backtester
  namespace: trading
  labels:
    app.kubernetes.io/name: backtester
    app.kubernetes.io/part-of: algo-trading-system
    app.kubernetes.io/component: backtester
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backtester
        app.kubernetes.io/part-of: algo-trading-system
        app.kubernetes.io/component: backtester
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: docker-hub-creds
      containers:
        - name: backtester
          image: docker.io/sudhan03/algo-trading:backtester-v69-1c65086
          env:
            - name: BT_START_DATE
              value: "2026-02-19"
            - name: BT_END_DATE
              value: "2026-02-19"
            - name: PYTHONPATH
              value: /app/src
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DB_HOST
              value: timescaledb
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: trading_db
            - name: DB_USER
              value: trading_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: REDIS_PASSWORD
          command:
            - python
            - -m
            - services.backtester.main
          args:
            - "--start"
            - "$(BT_START_DATE)"
            - "--end"
            - "$(BT_END_DATE)"
            - "--output-json"
            - "/tmp/backtest-results.json"
          volumeMounts:
            - name: trading-config
              mountPath: /app/config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: trading-config
          configMap:
            name: trading-config
